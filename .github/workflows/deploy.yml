name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: gen-lang-client-0421325030
  GCP_REGION: us-central1
  AR_REPO: triage-bot
  SERVICE_NAME: triage-bot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa  # v7.0.1
        with:
          version: v1.64.8
          install-mode: goinstall

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: projects/62054333602/locations/global/workloadIdentityPools/github-actions/providers/github-repo
          service_account: triage-bot-deploy@gen-lang-client-0421325030.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f  # v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/server:${IMAGE_TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3
        with:
          terraform_version: "1.5"

      - name: Terraform Apply
        env:
          TF_VAR_database_url: ${{ secrets.TF_VAR_DATABASE_URL }}
          TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_GEMINI_API_KEY }}
          TF_VAR_github_app_id: ${{ secrets.TF_VAR_GITHUB_APP_ID }}
          TF_VAR_github_private_key: ${{ secrets.TF_VAR_GITHUB_PRIVATE_KEY }}
          TF_VAR_webhook_secret: ${{ secrets.TF_VAR_WEBHOOK_SECRET }}
          TF_VAR_billing_account_id: ${{ secrets.TF_VAR_BILLING_ACCOUNT_ID }}
          TF_VAR_source_repo: "IsmaelMartinez/teams-for-linux"
          TF_VAR_shadow_repos: "IsmaelMartinez/teams-for-linux:IsmaelMartinez/teams-for-linux-shadow,IsmaelMartinez/triage-bot-test-repo:IsmaelMartinez/triage-bot-test-repo-shadow"
          TF_VAR_image_tag: sha-${{ github.sha }}
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
