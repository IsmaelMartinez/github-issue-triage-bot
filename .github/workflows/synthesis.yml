name: Weekly Synthesis

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC
  workflow_dispatch: {}

jobs:
  synthesize:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: projects/62054333602/locations/global/workloadIdentityPools/github-actions/providers/github-repo
          service_account: triage-bot-deploy@gen-lang-client-0421325030.iam.gserviceaccount.com
          token_format: 'id_token'
          id_token_audience: https://triage-bot-lhuutxzbnq-uc.a.run.app
          id_token_include_email: true

      - name: Trigger synthesis
        run: |
          echo "Triggering weekly synthesis..."
          HTTP_CODE=$(curl -sf -o /tmp/response.json -w "%{http_code}" \
            -X POST "https://triage-bot-lhuutxzbnq-uc.a.run.app/synthesize?repo=IsmaelMartinez/teams-for-linux" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.id_token }}" \
            -H "Content-Type: application/json" 2>/dev/null) || true

          echo "Response: $(cat /tmp/response.json 2>/dev/null) (HTTP ${HTTP_CODE})"

          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "::error::Synthesis failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
