name: Daily Maintenance
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      repos:
        description: 'Comma-separated list of repos for maintenance (cleanup, health check, reaction sync)'
        default: 'IsmaelMartinez/teams-for-linux,IsmaelMartinez/triage-bot-test-repo'
        required: false
permissions:
  contents: read
  id-token: write
jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: projects/62054333602/locations/global/workloadIdentityPools/github-actions/providers/github-repo
          service_account: triage-bot-deploy@gen-lang-client-0421325030.iam.gserviceaccount.com
      - name: Close stale shadow issues
        run: |
          TOKEN=$(gcloud auth print-identity-token --audiences=https://triage-bot-lhuutxzbnq-uc.a.run.app)
          curl -sf --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 3 --retry-connrefused -X POST \
            -H "Authorization: Bearer $TOKEN" \
            https://triage-bot-lhuutxzbnq-uc.a.run.app/cleanup \
            || echo "cleanup failed, continuing"
      - name: Run health check
        env:
          DASHBOARD_REPOS: ${{ inputs.repos || 'IsmaelMartinez/teams-for-linux,IsmaelMartinez/triage-bot-test-repo' }}
        run: |
          TOKEN=$(gcloud auth print-identity-token --audiences=https://triage-bot-lhuutxzbnq-uc.a.run.app)
          IFS=',' read -ra REPO_LIST <<< "$DASHBOARD_REPOS"
          for repo in "${REPO_LIST[@]}"; do
            repo=$(echo "$repo" | xargs)
            curl -sf --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 3 --retry-connrefused -X POST \
              -H "Authorization: Bearer $TOKEN" \
              "https://triage-bot-lhuutxzbnq-uc.a.run.app/health-check?repo=$repo" \
              || echo "health-check failed for $repo, continuing"
          done
      - name: Sync reactions
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          DASHBOARD_REPOS: ${{ inputs.repos || 'IsmaelMartinez/teams-for-linux,IsmaelMartinez/triage-bot-test-repo' }}
        run: |
          IFS=',' read -ra REPO_LIST <<< "$DASHBOARD_REPOS"
          for repo in "${REPO_LIST[@]}"; do
            repo=$(echo "$repo" | xargs)
            if [ -n "$GITHUB_TOKEN" ]; then
              REPO="$repo" go run ./cmd/sync-reactions || echo "sync-reactions failed for $repo, continuing"
            fi
          done
