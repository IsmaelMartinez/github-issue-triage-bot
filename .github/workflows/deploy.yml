name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT: gen-lang-client-0421325030
  GCP_REGION: us-central1
  AR_REPO: triage-bot
  SERVICE_NAME: triage-bot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
      - run: go test ./...
      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4
          golangci-lint run ./...
      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093  # v3.0.0
        with:
          workload_identity_provider: projects/62054333602/locations/global/workloadIdentityPools/github-actions/providers/github-repo
          service_account: triage-bot-deploy@gen-lang-client-0421325030.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db  # v3.0.1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${AR_REPO}/server:${IMAGE_TAG}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0
        with:
          terraform_version: "1.5"

      - name: Terraform Apply
        env:
          TF_VAR_database_url: ${{ secrets.TF_VAR_DATABASE_URL }}
          TF_VAR_gemini_api_key: ${{ secrets.TF_VAR_GEMINI_API_KEY }}
          TF_VAR_github_app_id: ${{ secrets.TF_VAR_GITHUB_APP_ID }}
          TF_VAR_github_private_key: ${{ secrets.TF_VAR_GITHUB_PRIVATE_KEY }}
          TF_VAR_webhook_secret: ${{ secrets.TF_VAR_WEBHOOK_SECRET }}
          TF_VAR_billing_account_id: ${{ secrets.TF_VAR_BILLING_ACCOUNT_ID }}
          TF_VAR_source_repo: "IsmaelMartinez/teams-for-linux"
          TF_VAR_shadow_repos: "IsmaelMartinez/teams-for-linux:IsmaelMartinez/teams-for-linux-shadow,IsmaelMartinez/triage-bot-test-repo:IsmaelMartinez/triage-bot-test-repo-shadow"
          TF_VAR_image_tag: sha-${{ github.sha }}
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
